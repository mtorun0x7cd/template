title = "mtorun0x7cd repository secret-scan policy"

# Baseline: gitleaks' default rule set.
[extend]
useDefault = true

[allowlist]
description = "Documented configuration placeholders in examples and documentation."
regexTarget = "match"
regexes = [
  '''<[a-z0-9._-]*(password|secret|key|token|username)[a-z0-9._-]*>''',

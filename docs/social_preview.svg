<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--accent)" flood-opacity="var(--glow-opacity)"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent: #2563eb;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #94a3b8;
                --text-badge: #64748b;
                --accent: #60a5fa;
                --badge-border: #334155;
                --glow-opacity: 0.25;
            }
        }
        .bg-border { stroke: var(--accent); stroke-opacity: 0.15; }
        .accent-stroke { stroke: var(--accent); }
        .accent-fill { fill: var(--accent); }
        .text-title { fill: var(--text-title); text-transform: uppercase; }
        .text-subtitle { fill: var(--text-subtitle); }
        .text-badge-dev { fill: var(--text-title); }
        .text-badge-gh { fill: var(--text-badge); }
        .badge-rect-dev { fill: var(--accent); fill-opacity: 0.12; stroke: var(--accent); stroke-opacity: 0.3; }
        .badge-rect-gh { stroke: var(--badge-border); }
        .divider { stroke: var(--accent); }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- ICON: replace this group with a bespoke line-art glyph for the project
         (accent-stroke / accent-fill, ~150x150, centred). See an instantiated
         repository for examples. The nested squares below are a placeholder. -->
    <g transform="translate(600, 205)" filter="url(#glow)">
        <rect x="-72" y="-72" width="144" height="144" rx="20" fill="none" class="accent-stroke" stroke-width="6"/>
        <rect x="-34" y="-34" width="68" height="68" rx="12" fill="none" class="accent-stroke" stroke-width="6"/>
    </g>

    <!-- Centered information block -->
    <g transform="translate(600, 380)">
        <text x="0" y="0" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="54" font-weight="900" letter-spacing="4" class="text-title" text-anchor="middle">{{PROJECT_NAME}}</text>

        <line x1="-200" y1="52" x2="200" y2="52" class="divider" stroke-width="3" stroke-linecap="round"/>

        <text x="0" y="97" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="18" font-weight="500" letter-spacing="0.5" class="text-subtitle" text-anchor="middle">{{TAGLINE}}</text>

        <g transform="translate(-187.5, 138)">
            <rect x="0" y="0" width="180" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="90" y="23" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" class="text-badge-dev" text-anchor="middle">{{BADGE_LABEL}}</text>
        </g>
        <g transform="translate(7.5, 138)">
            <rect x="0" y="0" width="180" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="90" y="23" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5" class="text-badge-gh" text-anchor="middle">@mtorun0x7cd</text>
        </g>
    </g>
</svg>
